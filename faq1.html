<!DOCTYPE html>
<html lang="en">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAQ Page</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #121212;
            color: #f8f9fa;
        }

        .accordion {
            border: none;
            box-shadow: none;
        }

        .accordion-item {
            border: none;
            margin-bottom: 10px;
            border-radius: 8px;
        }

        .accordion-button {
            background-color: #343a40;
            color: #f8f9fa;
            font-weight: bold;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 8px;
        }

        .accordion-button:hover,
        .accordion-button:focus,
        .accordion-button.active {
            background-color: #ffc107;
            color: #121212;
        }

        .accordion-body {
            background-color: #212529;
            color: #ffc107;
            padding: 15px;
            border-radius: 8px;
            margin-top: 10px;
        }

        h1 {
            color: #ffc107;
            margin-bottom: 40px;
            text-align: center;
        }

        #scrollTop {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: none;
            background-color: #ffc107;
            color: #121212;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: 18px;
            font-weight: bold;
        }

        #searchBar {
            margin-bottom: 30px;
            background-color: #212529;
            color: #ffc107;
            border: 2px solid #ffc107;
            border-radius: 8px;
            padding: 10px;
            width: 100%;
        }
    </style>
</head>

<body>

    // Scroll to top button
    $(window).scroll(function () {
        if ($(this).scrollTop() > 200) {
            $('#scrollTop').fadeIn();
        } else {
            $('#scrollTop').fadeOut();
        }
    });

    $('#scrollTop').click(function () {
        $('html, body').animate({ scrollTop: 0 }, 'slow');
    });

    // Search functionality
    $('#searchBar').on('keyup', function () {
        let value = $(this).val().toLowerCase();
        $('.accordion-item').filter(function () {
            $(this).toggle($(this).text().toLowerCase().indexOf(value) > -1);
        });
    });
